# Example wildflows rig registry (owner-facing config; YAML by policy).
#
# Each entry names a frame rig admitted by dispatch (and one root rig). The `kind`
# selects the process adapter; per-kind fields configure it. Loaded by
# wildflows.rigconfig.load_rigs(path) -> RigRegistry.
rigs:
  # Deterministic test substrate: echoes the prompt back. No process, no model.
  echo:
    kind: echo

  # Shells out to a command template ({prompt} is substituted, shell-quoted). This
  # is the light real path — here a placeholder `claude -p` invocation.
  shell-claude:
    kind: shell
    template: "claude -p {prompt}"
    timeout_s: 300        # required — no unbounded rig (a hung command must be reaped)

  # The production frame seam drives --worktree/--prompt/--log-dir/--handle-out/
  # --timeout scripts and supplies MCP capability environment. See docs/RIGS.md:
  #
